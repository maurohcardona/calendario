{% extends "base.html" %}

{% block content %}
<div class="stats-container">
    <h2 class="stats-title">
        Buscador de Determinaciones
    </h2>

    <!-- Buscador -->
    <div class="stats-card">
        <label class="stats-label">Buscar Determinación</label>
        <div class="stats-relative">
            <input 
                type="text" 
                id="inputBuscador" 
                class="stats-search-input"
                placeholder="Escriba para buscar determinación simple o compleja..." 
                autocomplete="off"
            />
            <div id="resultadosBuscador" class="stats-search-results"></div>
        </div>
    </div>

    <!-- Resultados -->
    <div id="seccionResultados" class="stats-hidden">
        <!-- Información de la determinación seleccionada -->
        <div class="stats-card">
            <h3 class="stats-section-title">Determinación Seleccionada</h3>
            <div class="stats-det-grid">
                <strong>Código:</strong>
                <span id="detCodigo">-</span>
                <strong>Nombre:</strong>
                <span id="detNombre">-</span>
                <strong>Tipo:</strong>
                <span id="detTipo">-</span>
            </div>
        </div>

        <!-- Estadísticas -->
        <div class="stats-card">
            <h3 class="stats-section-title">Estadísticas de Uso</h3>
            
            <!-- Selector de rango de fechas -->
            <div class="stats-date-selector">
                <div class="stats-date-controls">
                    <div class="stats-date-field">
                        <label for="fechaDesde" class="stats-date-label">
                            Fecha Desde
                        </label>
                        <input 
                            type="date" 
                            id="fechaDesde" 
                            class="stats-date-input"
                        />
                    </div>
                    <div class="stats-date-field">
                        <label for="fechaHasta" class="stats-date-label">
                            Fecha Hasta
                        </label>
                        <input 
                            type="date" 
                            id="fechaHasta" 
                            class="stats-date-input"
                        />
                    </div>
                    <button 
                        id="btnActualizarEstadisticas"
                        onclick="actualizarEstadisticas()"
                        class="stats-update-btn"
                    >
                        Actualizar
                    </button>
                </div>
            </div>
            
            <div class="stats-total-display">
                <div class="stats-total-label">TOTAL DE TURNOS</div>
                <div id="totalTurnos" class="stats-total-number">0</div>
                <div id="rangoFechas" class="stats-total-range"></div>
            </div>

            <div id="loadingEstadisticas" class="stats-loading">
                <div class="stats-loading-icon">⏳</div>
                <div>Cargando estadísticas...</div>
            </div>

            <div id="contenedorPorDia">
                <h4 class="stats-subsection-title">Turnos por Día</h4>
                <div id="listaPorDia" class="stats-day-list">
                    <!-- Se llenará con JavaScript -->
                </div>
            </div>

            <div id="sinResultados" class="stats-empty">
                <div class="stats-empty-icon">📭</div>
                <div>No se encontraron turnos con esta determinación</div>
            </div>
        </div>
    </div>
</div>

<script>
let determinacionesCache = null;
let determinacionSeleccionada = null;

// Cargar todas las determinaciones
async function cargarDeterminaciones() {
    if (determinacionesCache) return determinacionesCache;
    
    try {
        const response = await fetch('/determinaciones/api/listar-determinaciones/');
        determinacionesCache = await response.json();
        return determinacionesCache;
    } catch (error) {
        console.error('Error cargando determinaciones:', error);
        return [];
    }
}

// Buscador con autocompletado
document.getElementById('inputBuscador').addEventListener('input', async function() {
    const texto = this.value.trim().toLowerCase();
    const resultados = document.getElementById('resultadosBuscador');
    
    if (texto.length < 2) {
        resultados.style.display = 'none';
        return;
    }
    
    const items = await cargarDeterminaciones();
    const coincidencias = items.filter(d => 
        d.nombre.toLowerCase().includes(texto) || 
        d.codigo.toLowerCase().includes(texto)
    ).slice(0, 30);
    
    if (coincidencias.length === 0) {
        resultados.style.display = 'none';
        return;
    }
    
    resultados.innerHTML = coincidencias.map(item => {
        let tipoBadge = '';
        let tipoTexto = '';
        if (item.tipo === 'perfil') {
            tipoBadge = '<span class="stats-badge stats-badge-perfil">PERFIL</span>';
            tipoTexto = 'Perfil';
        } else if (item.tipo === 'compleja') {
            tipoBadge = '<span class="stats-badge stats-badge-compleja">COMPLEJA</span>';
            tipoTexto = 'Determinación Compleja';
        } else {
            tipoTexto = 'Determinación Simple';
        }
        
        return `
            <div class="stats-result-item" 
                 data-codigo="${item.codigo}" 
                 data-nombre="${item.nombre}" 
                 data-tipo="${tipoTexto}">
                <div class="stats-flex-between">
                    <div>
                        <span class="stats-result-code">${item.codigo}</span> - 
                        <span class="stats-result-name">${item.nombre}</span>
                    </div>
                    ${tipoBadge}
                </div>
            </div>
        `;
    }).join('');
    
    resultados.style.display = 'block';
    
    // Agregar eventos click a los resultados
    resultados.querySelectorAll('.stats-result-item').forEach(item => {
        item.addEventListener('click', function() {
            seleccionarDeterminacion({
                codigo: this.dataset.codigo,
                nombre: this.dataset.nombre,
                tipo: this.dataset.tipo
            });
            resultados.style.display = 'none';
            document.getElementById('inputBuscador').value = `${this.dataset.codigo} - ${this.dataset.nombre}`;
        });
    });
});

// Cerrar resultados al hacer clic fuera
document.addEventListener('click', function(e) {
    if (!e.target.closest('#inputBuscador') && !e.target.closest('#resultadosBuscador')) {
        document.getElementById('resultadosBuscador').style.display = 'none';
    }
});

// Seleccionar determinación y cargar estadísticas
async function seleccionarDeterminacion(det) {
    determinacionSeleccionada = det;
    
    // Mostrar información de la determinación
    document.getElementById('detCodigo').textContent = det.codigo;
    document.getElementById('detNombre').textContent = det.nombre;
    document.getElementById('detTipo').textContent = det.tipo;
    
    // Inicializar fechas por defecto (hoy hasta último día del año)
    const hoy = new Date();
    const ultimoDiaAnio = new Date(hoy.getFullYear(), 11, 31); // 11 = diciembre, 31 = último día
    
    document.getElementById('fechaDesde').value = hoy.toISOString().split('T')[0];
    document.getElementById('fechaHasta').value = ultimoDiaAnio.toISOString().split('T')[0];
    
    // Mostrar sección de resultados
    document.getElementById('seccionResultados').style.display = 'block';
    
    // Cargar estadísticas
    await cargarEstadisticas();
}

// Función para cargar estadísticas
async function cargarEstadisticas() {
    if (!determinacionSeleccionada) return;
    
    const fechaDesde = document.getElementById('fechaDesde').value;
    const fechaHasta = document.getElementById('fechaHasta').value;
    
    // Mostrar loading
    document.getElementById('loadingEstadisticas').style.display = 'block';
    document.getElementById('contenedorPorDia').style.display = 'none';
    document.getElementById('sinResultados').style.display = 'none';
    
    try {
        let url = `/determinaciones/api/estadisticas-determinacion/?codigo=${encodeURIComponent(determinacionSeleccionada.codigo)}`;
        if (fechaDesde) url += `&fecha_desde=${fechaDesde}`;
        if (fechaHasta) url += `&fecha_hasta=${fechaHasta}`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        document.getElementById('loadingEstadisticas').style.display = 'none';
        
        if (data.success) {
            // Mostrar total
            document.getElementById('totalTurnos').textContent = data.total_turnos;
            
            // Mostrar rango de fechas
            if (data.fecha_desde && data.fecha_hasta) {
                document.getElementById('rangoFechas').textContent = `Período: ${data.fecha_desde} al ${data.fecha_hasta}`;
            }
            
            if (data.total_turnos > 0) {
                // Mostrar lista por día
                document.getElementById('contenedorPorDia').style.display = 'block';
                const listaPorDia = document.getElementById('listaPorDia');
                
                listaPorDia.innerHTML = data.por_dia.map(dia => `
                    <div class="stats-day-item">
                        <span class="stats-day-date">${dia.fecha}</span>
                        <span class="stats-day-count">${dia.cantidad}</span>
                    </div>
                `).join('');
            } else {
                document.getElementById('sinResultados').style.display = 'block';
            }
        } else {
            alert('Error al cargar estadísticas: ' + (data.error || 'Error desconocido'));
        }
    } catch (error) {
        document.getElementById('loadingEstadisticas').style.display = 'none';
        alert('Error al cargar estadísticas: ' + error.message);
    }
}

// Función para actualizar estadísticas al cambiar fechas
async function actualizarEstadisticas() {
    await cargarEstadisticas();
}

// Precargar determinaciones al cargar la página
cargarDeterminaciones();
</script>
{% endblock %}
