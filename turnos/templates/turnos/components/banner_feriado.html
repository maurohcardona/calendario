<!-- Componente reutilizable: Banner de feriado -->
{% if es_feriado %}
<div style="background: var(--color-warning); border: 2px solid var(--color-warning-dark); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 4px 12px rgba(122, 184, 168, 0.3); color: var(--color-warning-text);">
    <div style="display: flex; align-items: center; gap: 1rem;">
        <div style="font-size: 2.5rem;">!</div>
        <div>
            <div style="font-size: 1.3rem; font-weight: bold; margin-bottom: 0.5rem;">DIA FERIADO</div>
            <div style="font-size: 1.1rem;">{{ descripcion }}</div>
            <div style="font-size: 0.9rem; margin-top: 0.5rem; opacity: 0.9;">No se pueden crear nuevos turnos en esta fecha</div>
        </div>
    </div>
</div>
{% endif %}
