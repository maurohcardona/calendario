<!-- Componente reutilizable: Campo de formulario -->
<div style="margin-bottom: 1.2rem;">
    <label style="color: var(--color-text); font-weight: 600; display: block; margin-bottom: 0.5rem; font-size: 0.95rem;">
        {{ label }}{% if required %} <span style="color: var(--color-danger);">*</span>{% endif %}
    </label>
    <input 
        type="{{ tipo|default:'text' }}" 
        name="{{ name }}" 
        value="{{ value|default:'' }}"
        {% if required %}required{% endif %}
        {% if readonly %}readonly{% endif %}
        {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
        style="width: 100%; background: {% if readonly %}var(--color-gray-lightest){% else %}var(--color-white){% endif %}; border: 2px solid var(--color-teal); color: var(--color-text); padding: 0.75rem; border-radius: 8px; font-family: inherit; font-size: 1.1rem; font-weight: 700; {% if readonly %}cursor: not-allowed;{% endif %}"
    />
</div>
