{% extends "base.html" %}
{% block content %}
<div class="apple-flex-between" style="margin-bottom: var(--space-xl); flex-wrap: wrap; gap: var(--space-md);">
    <div>
        <h2 class="apple-title">Calendario de Turnos</h2>
    </div>
</div>

<!-- Leyenda de agendas -->
<div class="apple-agenda-legend">
    <strong class="apple-agenda-legend-label">Agendas:</strong>
    {% for ag in agendas %}
    <div class="apple-agenda-chip agenda-chip" data-agenda-id="{{ ag.id }}">
        <div class="apple-agenda-chip-color" style="background: {{ ag.color }};"></div>
        <div class="apple-agenda-chip-name">{{ ag.name }}</div>
    </div>
    {% endfor %}
</div>

<div id="calendar" class="apple-calendar-wrapper"></div>

<!-- JSON seguro -->
{{ eventos|json_script:"eventos-data" }}

{% load static %}
<script src="{% static 'vendor/fullcalendar/core/index.global.min.js' %}"></script>
<script src="{% static 'vendor/fullcalendar/daygrid/index.global.min.js' %}"></script>
<script src="{% static 'vendor/fullcalendar/bootstrap5/index.global.min.js' %}"></script>
<script src="{% static 'vendor/fullcalendar/es.global.min.js' %}"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    var calendarEl = document.getElementById("calendar");
    var eventos = JSON.parse(document.getElementById("eventos-data").textContent);

    var calendar = null;
    var selectedAgendaId = null; // null = show all

    function renderCalendar(filteredAgendaId) {
        if (calendar) {
            calendar.destroy();
        }

        var eventsToShow = eventos.slice();
        if (filteredAgendaId) {
            eventsToShow = eventsToShow.filter(function(e) {
                return e.extendedProps && e.extendedProps.agenda_id == filteredAgendaId;
            });
        }

        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: "dayGridMonth",
            locale: "es",
            dayHeaderFormat: { weekday: 'long' },
            height: 'auto',
            contentHeight: 'auto',
            aspectRatio: 1.5,
            hiddenDays: [0, 6], // Oculta domingos (0) y sábados (6)
            headerToolbar: {
                left: 'prev,next hoyButton',
                center: 'title',
                right: 'mesButton,listaButton'
            },
            customButtons: {
                hoyButton: {
                    text: 'Hoy',
                    click: function() {
                        calendar.today();
                    }
                },
                mesButton: {
                    text: 'Mes',
                    click: function() {
                        calendar.changeView('dayGridMonth');
                    }
                },
                listaButton: {
                    text: 'Lista',
                    click: function() {
                        calendar.changeView('listMonth');
                    }
                }
            },
            titleFormat: function(date) {
                const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
                return meses[date.date.month] + ' ' + date.date.year;
            },
            events: eventsToShow,
            eventDidMount: function(info) {
                // Tachar eventos completos
                if (info.event.extendedProps.texto_tachado) {
                    info.el.classList.add('evento-completo');
                }
            },
            eventClick: function(info) {
                // Si es feriado, no hacer nada
                if (info.event.extendedProps.es_feriado) {
                    return;
                }
                
                const fecha = info.event.extendedProps.fecha;
                const agendaId = info.event.extendedProps.agenda_id;
                const esPasado = info.event.extendedProps.es_pasado;
                
                // No hacer nada si se hace click en una agenda de una fecha anterior a hoy
                const hoy = new Date().toISOString().split('T')[0];
                if (fecha < hoy) {
                    return;
                }
                
                if (info.event.extendedProps.disponibles === 0 && !esPasado) {
                    alert('Esta fecha está completa. No hay turnos disponibles para esta agenda.');
                    return;
                }
                let url = "{% url 'turnos:dia' '0000-00-00' %}".replace('0000-00-00', fecha);
                // Siempre incluir agenda cuando se hace click en un evento
                if (agendaId) {
                    url += '?agenda=' + agendaId;
                }
                window.location.href = url;
            },
            dateClick: function(info) {
                const fecha = info.dateStr;
                
                let url = "{% url 'turnos:dia' '0000-00-00' %}".replace('0000-00-00', fecha);
                if (selectedAgendaId) {
                    url += '?agenda=' + selectedAgendaId;
                }
                window.location.href = url;
            },
            dayCellDidMount: function(info) {
                const fecha = info.date.toISOString().split('T')[0];
                const hoy = new Date().toISOString().split('T')[0];
                
                // Marcar días pasados con estilo diferente
                if (fecha < hoy) {
                    info.el.style.backgroundColor = 'rgba(128, 128, 128, 0.1)';
                    info.el.style.opacity = '0.6';
                    info.el.style.cursor = 'pointer';
                }
                
                // Verificar si todas las agendas están completas para este día
                const eventosDia = eventsToShow.filter(e => e.start === fecha);
                if (eventosDia.length > 0) {
                    const todasCompletas = eventosDia.every(e => e.extendedProps.completo === true);
                    if (todasCompletas) {
                        info.el.classList.add('dia-todo-completo');
                    }
                }
                // Listener para click en el cuadrado del día (fuera de eventos/agendas)
                info.el.addEventListener('click', function(e) {
                    if (!e.target.closest('.fc-event')) {
                        let url = "{% url 'turnos:dia' '0000-00-00' %}".replace('0000-00-00', fecha);
                        if (selectedAgendaId) {
                            url += '?agenda=' + selectedAgendaId;
                        }
                        window.location.href = url;
                    }
                });
            }
        });

        calendar.render();
    }

    // initial render
    renderCalendar(null);

    // attach legend handlers
    document.querySelectorAll('.agenda-chip').forEach(function(chip){
        chip.addEventListener('click', function(){
            var aid = this.getAttribute('data-agenda-id');
            // toggle: if already selected -> reset
            if (selectedAgendaId && String(selectedAgendaId) === String(aid)) {
                selectedAgendaId = null;
                // remove active style
                document.querySelectorAll('.agenda-chip').forEach(c=>c.style.opacity=1);
                renderCalendar(null);
            } else {
                selectedAgendaId = aid;
                document.querySelectorAll('.agenda-chip').forEach(c=>c.style.opacity=0.5);
                this.style.opacity = 1;
                renderCalendar(aid);
            }
        });
    });

    // Auto-refresh: Recargar eventos cada 30 segundos
    setInterval(function() {
        fetch('/turnos/eventos/')
            .then(response => response.json())
            .then(data => {
                // Actualizar la variable eventos global
                eventos = data;
                // Re-renderizar el calendario con los nuevos eventos
                renderCalendar(selectedAgendaId);
                console.log('Calendario actualizado automáticamente');
            })
            .catch(error => console.error('Error actualizando calendario:', error));
    }, 30000); // 30000 ms = 30 segundos

    // Función para mostrar turnos históricos
    function mostrarTurnosHistoricos(fecha) {
        fetch(`/turnos/api/turnos-historicos/${fecha}/`)
            .then(response => response.json())
            .then(data => {
                let html = `
                    <div class="apple-modal-historicos" id="modalHistoricos">
                        <div class="apple-modal-historicos-content">
                            <div class="apple-modal-historicos-header">
                                <h3 class="apple-modal-historicos-title">Turnos del ${fecha}</h3>
                                <button onclick="document.getElementById('modalHistoricos').remove()" class="apple-btn apple-btn-danger">Cerrar</button>
                            </div>
                            <div class="apple-modal-historicos-stats">
                                Total de turnos: <strong>${data.total_turnos}</strong>
                            </div>
                `;
                
                // Iterar por cada agenda
                for (const [agendaName, turnosData] of Object.entries(data.agendas)) {
                    html += `<div class="apple-modal-agenda-section">`;
                    html += `<h4>${agendaName}</h4>`;
                    
                    // Turnos coordinados
                    if (turnosData.coordinados.length > 0) {
                        html += `<div style="margin-bottom: var(--space-md);">`;
                        html += `<h5>Coordinados (${turnosData.coordinados.length})</h5>`;
                        html += `<div class="apple-modal-turnos-grid">`;
                        turnosData.coordinados.forEach(turno => {
                            html += `
                                <div class="apple-modal-turno-coordinado">
                                    <div class="apple-modal-turno-nombre">${turno.apellido}, ${turno.nombre} - DNI: ${turno.dni}</div>
                                    <div class="apple-modal-turno-detalles">Determinaciones: ${turno.determinaciones || 'N/A'}</div>
                                </div>
                            `;
                        });
                        html += `</div></div>`;
                    }
                    
                    // Turnos no coordinados
                    if (turnosData.no_coordinados.length > 0) {
                        html += `<div>`;
                        html += `<h5>No coordinados (${turnosData.no_coordinados.length})</h5>`;
                        html += `<div class="apple-modal-turnos-grid">`;
                        turnosData.no_coordinados.forEach(turno => {
                            html += `
                                <div class="apple-modal-turno-no-coordinado">
                                    <div class="apple-modal-turno-nombre">${turno.apellido}, ${turno.nombre} - DNI: ${turno.dni}</div>
                                    <div class="apple-modal-turno-detalles">Determinaciones: ${turno.determinaciones || 'N/A'}</div>
                                </div>
                            `;
                        });
                        html += `</div></div>`;
                    }
                    
                    html += `</div>`;
                }
                
                if (data.total_turnos === 0) {
                    html += `<div class="apple-modal-empty">No hay turnos registrados para esta fecha</div>`;
                }
                
                html += `</div></div>`;
                
                document.body.insertAdjacentHTML('beforeend', html);
            })
            .catch(error => {
                console.error('Error obteniendo turnos históricos:', error);
                alert('Error al cargar los turnos históricos');
            });
    }

});
</script>
{% endblock %}
