{% extends "base.html" %}
{% block content %}
<div class="apple-container">
    <h2 class="apple-title">Editar Turno</h2>

    <form method="post" class="apple-card">
        {% csrf_token %}
        
        <!-- Agenda -->
        <div class="apple-form-group">
            <label class="apple-label">Agenda</label>
            <select name="agenda" id="id_agenda" required class="apple-select">
                {% for agenda in agendas %}
                    <option value="{{ agenda.id }}" {% if agenda.id == turno.agenda.id %}selected{% endif %}>{{ agenda.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- DNI (No editable) -->
        <div class="apple-form-group">
            <label class="apple-label">DNI</label>
            <input type="text" value="{% if paciente %}{{ paciente.dni }}{% else %}{{ turno.paciente_dni }}{% endif %}" readonly class="apple-input apple-input-dni" />
        </div>

        <!-- Campos Apellido y Nombre en la misma fila -->
        <div class="apple-grid apple-grid-2">
            <div class="apple-form-group">
                <label class="apple-label">Apellido</label>
                <input type="text" value="{% if paciente %}{{ paciente.apellido }}{% else %}{{ turno.apellido }}{% endif %}" readonly class="apple-input apple-input-readonly" />
            </div>
            <div class="apple-form-group">
                <label class="apple-label">Nombre</label>
                <input type="text" value="{% if paciente %}{{ paciente.nombre }}{% else %}{{ turno.nombre }}{% endif %}" readonly class="apple-input apple-input-readonly" />
            </div>
        </div>

        <!-- Campos Fecha de Nacimiento y Sexo en la misma fila -->
        <div class="apple-grid apple-grid-2">
            <div class="apple-form-group">
                <label class="apple-label">Fecha de Nacimiento</label>
                <input type="date" value="{% if paciente %}{{ paciente.fecha_nacimiento|date:'Y-m-d' }}{% endif %}" class="apple-input" />
            </div>
            <div class="apple-form-group">
                <label class="apple-label">Sexo</label>
                <input type="text" value="{% if paciente %}{{ paciente.sexo }}{% endif %}" class="apple-input" />
            </div>
        </div>

        <!-- Campos Teléfono, Email y Médico en una fila -->
        <div class="apple-grid apple-grid-3">
            <div class="apple-form-group">
                <label class="apple-label">Teléfono</label>
                <input type="tel" name="telefono" value="{% if paciente %}{{ paciente.telefono }}{% endif %}" class="apple-input" />
            </div>
            <div class="apple-form-group">
                <label class="apple-label">Email</label>
                <input type="email" name="email" value="{% if paciente %}{{ paciente.email|lower }}{% endif %}" oninput="this.value=this.value.toLowerCase()" class="apple-input" />
            </div>
            <div class="apple-form-group apple-form-group-relative">
                <label class="apple-label">Médico</label>
                <input type="text" id="id_medico" name="medico" value="{% if turno.medico %}{{ turno.medico.nombre }}{% endif %}" autocomplete="off" placeholder="Buscar médico..." class="apple-input" />
                <div id="autocompleteMedicos" class="apple-autocomplete-list"></div>
            </div>
        </div>


        <!-- Observaciones de paciente -->
        <div class="apple-form-group">
            <label class="apple-label">Observaciones de paciente</label>
            <input type="text" name="observaciones_paciente" value="{% if paciente %}{{ paciente.observaciones|default:'' }}{% endif %}" class="apple-input" />
        </div>

        <!-- Campo Nota Interna -->
        <div class="apple-form-group">
            <label class="apple-label">Nota Interna</label>
            <textarea name="nota_interna" rows="2" class="apple-textarea">{{ turno.nota_interna|default:"" }}</textarea>
        </div>

        <!-- Fecha del Turno (Editable) -->
        <div class="apple-form-group">
            <label class="apple-label">Fecha del Turno</label>
            <input type="date" name="fecha" id="id_fecha" value="{{ turno.fecha|date:'Y-m-d' }}" required class="apple-input" />
        </div>

        <!-- Determinaciones -->
        <div class="apple-form-group">
            <label class="apple-label">Determinaciones</label>
            <div class="apple-grid apple-grid-determinaciones">
                <input type="text" id="inputCodigo" placeholder="Código" class="apple-input" />
                <div class="apple-form-group-relative">
                    <input type="text" id="inputNombre" placeholder="Buscar por nombre..." autocomplete="off" class="apple-input" />
                    <div id="autocompleteLista" class="apple-autocomplete-list"></div>
                </div>
                <button type="button" id="btnAgregarDet" class="apple-btn apple-btn-success">Agregar</button>
            </div>
            <div id="detStatus" class="apple-status"></div>
            <div id="listaDeterminaciones" class="apple-determinaciones-list">
                <p class="text-gray text-center">No hay determinaciones agregadas</p>
            </div>
            <input type="hidden" id="id_determinaciones" name="determinaciones" value="{{ turno.determinaciones }}" />
        </div>

        <div class="apple-flex apple-flex-buttons">
            <button type="submit" class="apple-btn apple-btn-primary">Guardar cambios</button>
            <a href="{% url 'turnos:eliminar_turno' turno.id %}" class="apple-btn apple-btn-danger">Eliminar Turno</a>
            <a href="{% url 'turnos:dia' turno.fecha %}?agenda={{ turno.agenda.id }}" class="apple-btn apple-btn-light">Cancelar</a>
        </div>
    </form>

    <div class="apple-margin-top-xl">
        <a href="{% url 'turnos:calendario' %}" class="apple-nav-link">← Volver al calendario</a>
    </div>
</div>



<script>
let determinaciones = [];
let determinacionesCache = null;
let medicosCache = null;

// Cargar todos los médicos al inicio
async function cargarMedicos() {
    if (medicosCache) return medicosCache;
    
    try {
        const response = await fetch('/turnos/api/listar-medicos/');
        medicosCache = await response.json();
        return medicosCache;
    } catch (error) {
        console.error('Error cargando médicos:', error);
        return [];
    }
}

// Cargar determinaciones existentes del turno
window.addEventListener('DOMContentLoaded', async function() {
    const codigosExistentes = '{{ turno.determinaciones }}'.split(',').map(c => c.trim()).filter(c => c);
    
    if (codigosExistentes.length > 0) {
        for (const codigo of codigosExistentes) {
            try {
                const response = await fetch(`/determinaciones/api/buscar-codigo/?codigo=${encodeURIComponent(codigo)}`);
                const data = await response.json();
                
                if (data.found) {
                    if (data.tipo === 'perfil') {
                        determinaciones.push({
                            tipo: 'perfil',
                            codigo: data.codigo,
                            nombre: data.nombre,
                            determinaciones: data.determinaciones
                        });
                    } else if (data.tipo === 'compleja') {
                        determinaciones.push({
                            tipo: 'compleja',
                            codigo: data.codigo,
                            nombre: data.nombre,
                            determinaciones: data.determinaciones,
                            stock: data.stock !== undefined ? data.stock : true
                        });
                    } else {
                        determinaciones.push({
                            tipo: 'determinacion',
                            codigo: data.codigo,
                            nombre: data.nombre,
                            stock: data.stock !== undefined ? data.stock : true
                        });
                    }
                }
            } catch (error) {
                console.error('Error cargando determinación:', codigo, error);
            }
        }
        actualizarListaDeterminaciones();
    }
});

// Cargar todas las determinaciones y perfiles al inicio
async function cargarDeterminaciones() {
    if (determinacionesCache) return determinacionesCache;
    
    try {
        const response = await fetch('/determinaciones/api/listar-determinaciones/');
        determinacionesCache = await response.json();
        return determinacionesCache;
    } catch (error) {
        console.error('Error cargando determinaciones:', error);
        return [];
    }
}

// Autocompletado por nombre
document.getElementById('inputNombre').addEventListener('input', async function() {
    const texto = this.value.trim().toLowerCase();
    const lista = document.getElementById('autocompleteLista');
    
    if (texto.length < 2) {
        lista.style.display = 'none';
        return;
    }
    
    const items = await cargarDeterminaciones();
    const coincidencias = items.filter(d => 
        d.nombre.toLowerCase().includes(texto)
    ).slice(0, 20);
    
    if (coincidencias.length === 0) {
        lista.style.display = 'none';
        return;
    }
    
    lista.innerHTML = coincidencias.map(item => {
        let tipoBadge = '';
        let sinStockBadge = '';
        let estiloGris = item.stock === false ? 'opacity: 0.5;' : '';
        
        if (item.tipo === 'perfil') {
            tipoBadge = '<span class="apple-badge apple-badge-green">PERFIL</span>';
        } else if (item.tipo === 'compleja') {
            tipoBadge = '<span class="apple-badge apple-badge-purple">COMPLEJA</span>';
        }
        
        if (item.stock === false) {
            sinStockBadge = '<span class="apple-badge apple-badge-gray">SIN STOCK</span>';
        }
        
        return `
            <div class="apple-autocomplete-item" data-codigo="${item.codigo}" data-nombre="${item.nombre}" data-tipo="${item.tipo}">
                <strong class="text-blue">${item.codigo}</strong> - <span>${item.nombre}</span> ${tipoBadge} ${sinStockBadge}
            </div>
        `;
    }).join('');
    
    lista.style.display = 'block';
    
    lista.querySelectorAll('.apple-autocomplete-item').forEach(item => {
        item.addEventListener('click', function() {
            const codigo = this.dataset.codigo;
            const nombre = this.dataset.nombre;
            document.getElementById('inputCodigo').value = codigo;
            document.getElementById('inputNombre').value = nombre;
            lista.style.display = 'none';
        });
    });
});

// Cerrar autocompletado al hacer clic fuera
document.addEventListener('click', function(e) {
    if (!e.target.closest('#inputNombre') && !e.target.closest('#autocompleteLista')) {
        document.getElementById('autocompleteLista').style.display = 'none';
    }
    if (!e.target.closest('#id_medico') && !e.target.closest('#autocompleteMedicos')) {
        document.getElementById('autocompleteMedicos').style.display = 'none';
    }
});

// Autocompletado de médicos
document.getElementById('id_medico').addEventListener('input', async function() {
    const texto = this.value.trim().toLowerCase();
    const lista = document.getElementById('autocompleteMedicos');
    
    if (texto.length < 2) {
        lista.style.display = 'none';
        return;
    }
    
    const medicos = await cargarMedicos();
    const coincidencias = medicos.filter(m => 
        m.nombre_apellido.toLowerCase().includes(texto)
    ).slice(0, 15);
    
    if (coincidencias.length === 0) {
        lista.style.display = 'none';
        return;
    }
    
    lista.innerHTML = coincidencias.map(medico => {
        return `
            <div class="apple-autocomplete-item" data-nombre="${medico.nombre_apellido}">
                <span class="text-semibold">${medico.nombre_apellido}</span>
            </div>
        `;
    }).join('');
    
    lista.style.display = 'block';
    
    lista.querySelectorAll('.apple-autocomplete-item').forEach(item => {
        item.addEventListener('click', function() {
            const nombre = this.dataset.nombre;
            document.getElementById('id_medico').value = nombre;
            lista.style.display = 'none';
        });
    });
});

// Agregar determinación o perfil
document.getElementById('btnAgregarDet').addEventListener('click', async function() {
    const codigo = document.getElementById('inputCodigo').value.trim();
    const status = document.getElementById('detStatus');
    
    if (!codigo) {
        status.innerHTML = '<span class="apple-status-error">Ingrese un código</span>';
        return;
    }
    
    status.innerHTML = '<span class="apple-status-warning">Buscando...</span>';
    
    try {
        const response = await fetch(`/determinaciones/api/buscar-codigo/?codigo=${encodeURIComponent(codigo)}`);
        const data = await response.json();
        
        if (data.found) {
            if (data.tipo === 'compleja') {
                const yaExiste = determinaciones.find(d => d.tipo === 'compleja' && d.codigo === data.codigo);
                if (yaExiste) {
                    status.innerHTML = '<span class="apple-status-warning">Ya agregada</span>';
                    return;
                }
                
                determinaciones.push({
                    tipo: 'compleja',
                    codigo: data.codigo,
                    nombre: data.nombre,
                    determinaciones: data.determinaciones,
                    stock: data.stock !== undefined ? data.stock : true
                });
                status.innerHTML = '<span class="apple-status-success">Determinación compleja agregada</span>';
            } else if (data.tipo === 'perfil') {
                const detCodesRaw = Array.isArray(data.determinaciones)
                    ? data.determinaciones
                    : (data.determinaciones || '').split(',').map(d => d.trim()).filter(Boolean);

                if (detCodesRaw.length === 0) {
                    status.innerHTML = '<span class="apple-status-warning">El perfil no tiene determinaciones</span>';
                    return;
                }

                const catalogo = await cargarDeterminaciones();
                let agregadas = 0;

                for (const code of detCodesRaw) {
                    if (code.startsWith('/')) {
                        const yaExisteCompleja = determinaciones.find(d => d.tipo === 'compleja' && d.codigo === code);
                        if (yaExisteCompleja) continue;
                        
                        const itemCompleja = catalogo.find(d => d.codigo === code && d.tipo === 'compleja');
                        if (itemCompleja) {
                            determinaciones.push({
                                tipo: 'compleja',
                                codigo: itemCompleja.codigo,
                                nombre: itemCompleja.nombre,
                                determinaciones: itemCompleja.determinaciones,
                                stock: itemCompleja.stock !== undefined ? itemCompleja.stock : true
                            });
                            agregadas += 1;
                        }
                    } else {
                        const yaExisteDet = determinaciones.find(d => d.tipo === 'determinacion' && d.codigo === code);
                        if (yaExisteDet) continue;
                        
                        const itemCat = catalogo.find(d => d.codigo === code && d.tipo === 'determinacion');
                        const nombreDet = itemCat ? itemCat.nombre : code;
                        determinaciones.push({
                            tipo: 'determinacion',
                            codigo: code,
                            nombre: nombreDet,
                            stock: itemCat && itemCat.stock !== undefined ? itemCat.stock : true
                        });
                        agregadas += 1;
                    }
                }

                if (agregadas === 0) {
                    status.innerHTML = '<span class="apple-status-warning">Todas las determinaciones del perfil ya estaban agregadas</span>';
                } else {
                    status.innerHTML = `<span class="apple-status-success">Perfil agregado (${agregadas} determinaciones)</span>`;
                }
            } else {
                const yaExiste = determinaciones.find(d => d.tipo === 'determinacion' && d.codigo === data.codigo);
                if (yaExiste) {
                    status.innerHTML = '<span class="apple-status-warning">Ya agregada</span>';
                    return;
                }
                
                determinaciones.push({
                    tipo: 'determinacion',
                    codigo: data.codigo,
                    nombre: data.nombre,
                    stock: data.stock !== undefined ? data.stock : true
                });
                status.innerHTML = '<span class="apple-status-success">Determinación agregada</span>';
            }
            
            actualizarListaDeterminaciones();
            document.getElementById('inputCodigo').value = '';
            document.getElementById('inputNombre').value = '';
            setTimeout(() => status.innerHTML = '', 2000);
        } else {
            status.innerHTML = '<span class="apple-status-error">Código no encontrado</span>';
        }
    } catch (error) {
        console.error('Error al buscar determinación:', error);
        status.innerHTML = '<span class="apple-status-error">Error al buscar: ' + error.message + '</span>';
    }
});

// Enter para agregar determinación
document.getElementById('inputCodigo').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('btnAgregarDet').click();
    }
});

document.getElementById('inputNombre').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('btnAgregarDet').click();
    }
});

function actualizarListaDeterminaciones() {
    const lista = document.getElementById('listaDeterminaciones');
    
    if (determinaciones.length === 0) {
        lista.innerHTML = '<p class="text-gray text-center">No hay determinaciones agregadas</p>';
    } else {
        lista.innerHTML = determinaciones.map((item, index) => {
            let itemClasses = 'apple-flex-between apple-turno-item';
            let stockBadge = item.stock === false ? '<span class="apple-badge apple-badge-gray">SIN STOCK</span>' : '';
            
            if (item.stock === false) {
                itemClasses += ' apple-item-disabled';
            }

            if (item.tipo === 'perfil') {
                return `
                    <div class="${itemClasses} item-perfil">
                        <div>
                            <span class="apple-badge apple-badge-green">PERFIL</span>
                            <strong class="text-green">${item.codigo}</strong> - <span>${item.nombre}</span>
                            <div class="text-sm text-gray">${(item.determinaciones && typeof item.determinaciones === 'string') ? item.determinaciones.split(',').filter(d => d.trim()).length : 0} determinaciones</div>
                        </div>
                        <button type="button" onclick="eliminarItem(${index})" class="apple-btn apple-btn-danger apple-btn-sm">Eliminar</button>
                    </div>
                `;
            } else if (item.tipo === 'compleja') {
                return `
                    <div class="${itemClasses} item-compleja">
                        <div>
                            <span class="apple-badge apple-badge-purple">COMPLEJA</span>
                            <strong class="text-purple">${item.codigo}</strong> - <span>${item.nombre}</span> ${stockBadge}
                        </div>
                        <button type="button" onclick="eliminarItem(${index})" class="apple-btn apple-btn-danger apple-btn-sm">Eliminar</button>
                    </div>
                `;
            } else {
                return `
                    <div class="${itemClasses}">
                        <div>
                            <strong class="text-blue">${item.codigo}</strong> - <span>${item.nombre}</span> ${stockBadge}
                        </div>
                        <button type="button" onclick="eliminarItem(${index})" class="apple-btn apple-btn-danger apple-btn-sm">Eliminar</button>
                    </div>
                `;
            }
        }).join('');
    }
    
    // Actualizar campo oculto con códigos
    const codigos = determinaciones.map(item => item.codigo.toString());
    document.getElementById('id_determinaciones').value = codigos.join(',');
}

function eliminarItem(index) {
    determinaciones.splice(index, 1);
    actualizarListaDeterminaciones();
}

// Cargar determinaciones al cargar la página
cargarDeterminaciones();
cargarMedicos();
</script>

{% endblock %}
