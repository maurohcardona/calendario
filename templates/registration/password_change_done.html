{% extends "base.html" %}
{% load static %}

{% block title %}Contrasena cambiada{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; padding: 20px; text-align: center;">
  <div style="background: var(--color-white); padding: 40px; border-radius: 8px; box-shadow: 0 2px 4px rgba(96, 80, 99, 0.1); border: 1px solid var(--color-gray-lighter);">
    <div style="font-size: 48px; margin-bottom: 20px; color: var(--color-success);">OK</div>
    <h2 style="color: var(--color-primary); margin-bottom: 15px;">Contrasena cambiada exitosamente</h2>
    <p style="color: var(--color-text-light); margin-bottom: 30px;">
      Tu contrasena ha sido actualizada correctamente.
    </p>
    <a href="{% url 'turnos:calendario' %}" 
       style="display: inline-block; padding: 12px 30px; background-color: var(--color-primary); color: white; border: none; border-radius: 4px; text-decoration: none; font-size: 16px;">
      Volver a la agenda
    </a>
  </div>
</div>
{% endblock %}
