{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesion - Agendador</title>

    <!-- Bootstrap CDN -->
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="{% static 'css/apple-design.css' %}" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
        }
        body {
            background: linear-gradient(135deg, var(--color-cream) 0%, var(--color-mint-light) 100%);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }
        .login-card {
            max-width: 420px;
            width: 100%;
            padding: 2.5rem;
            background: var(--color-white);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--color-gray-light);
        }
        .login-card h2 {
            color: var(--color-primary);
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 600;
            font-size: 1.8rem;
        }
        .form-label {
            color: var(--color-text);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .form-control {
            background: var(--color-gray-lightest);
            border: 1px solid var(--color-gray-light);
            color: var(--color-text);
            padding: 0.75rem 1rem;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            transition: all var(--transition-normal);
        }
        .form-control:focus {
            background: var(--color-white);
            border-color: var(--color-primary);
            color: var(--color-text);
            box-shadow: 0 0 0 3px rgba(36, 143, 141, 0.15);
        }
        .form-control::placeholder {
            color: var(--color-gray);
        }
        /* Estilos específicos para inputs del formulario de login */
        #id_username,
        #id_password {
            width: 100%;
            background: var(--color-gray-lightest);
            border: 1px solid var(--color-gray-light);
            color: var(--color-text);
            padding: 0.75rem 1rem;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            transition: all var(--transition-normal);
        }
        #id_username:focus,
        #id_password:focus {
            background: var(--color-white);
            border-color: var(--color-primary);
            color: var(--color-text);
            box-shadow: 0 0 0 3px rgba(36, 143, 141, 0.15);
            outline: none;
        }
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-teal) 100%);
            color: var(--color-white);
            border: none;
            border-radius: var(--border-radius-sm);
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all var(--transition-normal);
            margin-top: 1.5rem;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(36, 143, 141, 0.3);
        }
        .alert-danger {
            background: var(--color-danger-light);
            border: 1px solid var(--color-danger);
            color: var(--color-danger-text);
            border-radius: var(--border-radius-sm);
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-section h1 {
            color: var(--color-primary);
            font-size: 2.5rem;
            margin: 0;
        }
        .logo-section p {
            color: var(--color-gray);
            margin-top: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <h1>Agendador</h1>
                <p style="font-weight: 600; color: var(--color-text);">Sistema de citas y turnos</p>
            </div>

            <!-- Mensajes de error -->
            {% if form.errors %}
                <div class="alert-danger">
                    <strong>Error</strong><br>
                    Usuario o contrasena incorrectos.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuario</label>
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label for="id_password" class="form-label">Contrasena</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="btn-login">Iniciar sesion</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Convertir el username a mayusculas mientras se escribe
        const usernameInput = document.getElementById('id_username');
        if (usernameInput) {
            usernameInput.addEventListener('input', function() {
                this.value = this.value.toUpperCase();
            });
        }
    </script>
</body>
</html>
